<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navos · 创意助手</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090d;--bg2:#0d0f15;--bg3:#12151e;--bg4:#181c28;--bg5:#1f2435;
  --border:#ffffff08;--border2:#ffffff10;--border3:#ffffff1a;
  --text:#eaecf2;--text2:#a0a6bc;--text3:#5c6380;
  --blue:#4374F7;--blue2:#5a8af8;
  --accent:#00e0aa;--accent2:#00bd90;--accent-g:#00e0aa20;
  --warn:#ffb44e;--purple:#8b6cf7;--pink:#f06292;--red:#ef5350;--cyan:#22d3ee;
  --font:'Outfit','Noto Sans SC',system-ui,sans-serif;
  --mono:'Courier New',monospace;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:2px}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barAnim{0%,100%{height:3px}50%{height:14px}}
@keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes pulse3{0%,100%{box-shadow:0 0 0 0 #4374F740}70%{box-shadow:0 0 0 12px #4374F700}}
@keyframes shimmer2{0%{left:-100%}100%{left:100%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* Sidebar */
.sb{position:fixed;top:0;left:0;bottom:0;width:52px;background:#0a0c12;border-right:1px solid var(--border2);display:flex;flex-direction:column;align-items:center;padding:10px 0;z-index:200}
.sb-logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#4374F7,#6b8ff8);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;margin-bottom:16px;cursor:pointer}
.sb-i{width:36px;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:7px;cursor:pointer;color:var(--text3);font-size:9px;margin-bottom:2px;transition:.15s}
.sb-i:hover,.sb-i.on{background:#4374F715;color:var(--blue2)}
.sb-bot{margin-top:auto}

.app{margin-left:52px;min-height:100vh}
.view{display:none}.view.active{display:block}

/* Topbar */
.top{position:sticky;top:0;z-index:100;background:#08090ddd;backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:48px}
.top-l{display:flex;align-items:center;gap:10px}
.top-t{font-size:14px;font-weight:700;letter-spacing:-.02em}
.top-tag{font-size:9px;padding:2px 7px;border-radius:3px;border:1px solid var(--border2);color:var(--text3)}

/* ═══ COMMON ═══ */
.btn{padding:8px 24px;border-radius:7px;font-size:12px;font-weight:600;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,#4374F7,#5a8af8);color:#fff;box-shadow:0 4px 16px #4374F730}
.btn-p:hover{box-shadow:0 6px 24px #4374F750}
.btn-acc{background:linear-gradient(135deg,#00e0aa,#00bd90);color:#08090d}
.btn-acc:disabled{background:#ffffff0a;color:var(--text3);cursor:not-allowed;box-shadow:none}
.btn-g{background:transparent;border:1px solid var(--border3);color:var(--text2)}
.btn-g:hover{background:#ffffff06}
.btn-s{padding:4px 12px;font-size:10.5px;border-radius:5px}
.btn-xs{padding:2px 8px;font-size:9px;border-radius:4px}
.btns{display:flex;gap:8px;justify-content:center;margin-top:24px}
.badge{font-size:9px;padding:3px 9px;border-radius:4px;font-weight:500;display:inline-flex;align-items:center;gap:3px}
.spinner{width:14px;height:14px;border:1.5px solid #ffffff12;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}

/* ═══ HOMEPAGE ═══ */
.home{overflow-y:auto;height:calc(100vh - 48px)}

.hero{position:relative;padding:44px 32px 32px;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,#4374F710 0%,transparent 70%);pointer-events:none}
.hero-inner{max-width:880px;margin:0 auto;position:relative;z-index:1}
.hero-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;background:#4374F712;border:1px solid #4374F730;margin-bottom:14px;animation:fadeUp .4s ease}
.hero-pill-dot{width:6px;height:6px;border-radius:50%;background:#4374F7;animation:glow 2s infinite}
.hero-pill span{font-size:11px;color:var(--blue2);font-weight:500}
.hero-h1{font-size:34px;font-weight:800;line-height:1.2;letter-spacing:-.04em;margin-bottom:10px;animation:fadeUp .4s ease .08s both}
.hero-h1 .grad{background:linear-gradient(135deg,#4374F7,#00e0aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:14px;color:var(--text2);line-height:1.6;max-width:520px;margin-bottom:20px;animation:fadeUp .4s ease .16s both}

/* Mode selector */
.mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;animation:fadeUp .4s ease .24s both}
.mode-card{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:16px 14px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.mode-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 24px #4374F718}
.mode-card::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#ffffff06,transparent);pointer-events:none}
.mode-card:hover::after{animation:shimmer2 .7s ease forwards}
.mode-card.featured{border-color:#4374F740;background:linear-gradient(135deg,#4374F708,var(--bg3))}
.mode-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px}
.mode-name{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.mode-desc{font-size:10.5px;color:var(--text3);line-height:1.4}
.mode-tag{font-size:7.5px;padding:1px 5px;border-radius:3px;font-weight:600}
.mode-uses{font-size:9px;color:var(--text3);margin-top:6px;font-family:var(--mono)}

.hero-stats{display:flex;gap:24px;animation:fadeUp .4s ease .32s both}
.hero-stat-n{font-size:20px;font-weight:800;font-family:var(--mono);letter-spacing:-.02em}
.hero-stat-l{font-size:10px;color:var(--text3);margin-top:1px}

/* Showcase floats */
.showcase{position:absolute;right:-10px;top:28px;display:flex;gap:8px;animation:fadeUp .5s ease .3s both}
.sc-card{width:105px;border-radius:10px;overflow:hidden;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;transition:.25s}
.sc-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:0 6px 20px #4374F718}
.sc-vid{aspect-ratio:9/16;position:relative}
.sc-label{padding:5px 7px;font-size:8.5px;color:var(--text2);text-align:center}
.sc-hot{position:absolute;top:4px;left:4px;padding:1px 5px;border-radius:2px;background:#ef5350;color:#fff;font-size:7px;font-weight:700;z-index:2}

/* Ticker */
.ticker{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:9px 0;overflow:hidden;background:var(--bg2)}
.ticker-inner{display:flex;gap:28px;animation:marquee 35s linear infinite;width:max-content}
.ticker-i{display:flex;align-items:center;gap:6px;white-space:nowrap;font-size:11px;color:var(--text3)}
.ticker-dot{width:4px;height:4px;border-radius:50%}

/* Template section */
.sec{max-width:880px;margin:0 auto;padding:28px 32px 0}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-head h2{font-size:16px;font-weight:700;letter-spacing:-.02em}
.sec-head a{font-size:11px;color:var(--blue2);cursor:pointer}
.sec-tabs{display:flex;gap:4px;margin-bottom:14px}
.sec-tab{padding:5px 12px;border-radius:6px;font-size:10.5px;cursor:pointer;color:var(--text3);font-weight:500;transition:.15s}
.sec-tab:hover{background:#ffffff08}
.sec-tab.on{background:var(--blue);color:#fff}

.tpl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tpl-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.tpl-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 20px #4374F718}
.tpl-card::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#ffffff06,transparent);pointer-events:none}
.tpl-card:hover::after{animation:shimmer2 .7s ease forwards}
.tpl-thumb{aspect-ratio:4/3;position:relative;overflow:hidden}
.tpl-badges{position:absolute;top:6px;left:6px;display:flex;gap:3px}
.tpl-badge{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:600}
.tpl-hover{position:absolute;inset:0;background:#00000055;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s}
.tpl-card:hover .tpl-hover{opacity:1}
.tpl-hover-btn{padding:7px 16px;border-radius:6px;background:#fff;color:var(--bg);font-size:10px;font-weight:700}
.tpl-body{padding:8px 10px}
.tpl-name{font-size:11.5px;font-weight:600;margin-bottom:2px}
.tpl-desc{font-size:9.5px;color:var(--text3);line-height:1.3}
.tpl-meta{display:flex;align-items:center;gap:5px;margin-top:4px;font-size:9px;color:var(--text3)}
.tpl-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--text3)}

/* Before/After */
.ba-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ba-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s}
.ba-card:hover{border-color:var(--accent);box-shadow:0 4px 20px #00e0aa12;transform:translateY(-2px)}
.ba-vis{height:130px;display:flex;position:relative}
.ba-l,.ba-r{flex:1;position:relative;overflow:hidden}
.ba-l::after{content:'输入';position:absolute;bottom:5px;left:6px;font-size:7.5px;padding:1px 5px;border-radius:2px;background:#ffffff20;color:#ffffffbb}
.ba-r::after{content:'AI 生成';position:absolute;bottom:5px;right:6px;font-size:7.5px;padding:1px 5px;border-radius:2px;background:#00e0aa35;color:#00e0aa}
.ba-div{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--accent);z-index:2}
.ba-div::after{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--bg);line-height:16px;text-align:center}
.ba-body{padding:8px 10px}
.ba-name{font-size:11px;font-weight:600;margin-bottom:2px}
.ba-cta{font-size:9.5px;color:var(--accent)}

/* Trending */
.trend-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}
.trend-card{min-width:130px;max-width:130px;border-radius:10px;overflow:hidden;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;transition:.2s;flex-shrink:0}
.trend-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.trend-vid{aspect-ratio:9/16;position:relative}
.trend-info{padding:5px 7px;font-size:9px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.trend-tag{font-size:7.5px;padding:1px 4px;border-radius:2px;background:var(--blue);color:#fff}

/* CTA */
.cta-bar{max-width:880px;margin:28px auto 0;padding:0 32px}
.cta-inner{background:linear-gradient(135deg,#1a2460,#2a3880,#4374F7);border-radius:14px;padding:24px 28px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.cta-inner::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,#00e0aa12,transparent)}
.home-foot{height:40px}

/* ═══ GALLERY ═══ */
.gal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border)}
.gal-tabs{display:flex;gap:3px}
.gal-tab{padding:4px 10px;border-radius:5px;font-size:10.5px;cursor:pointer;color:var(--text3);font-weight:500;transition:.15s}
.gal-tab:hover{background:#ffffff08}.gal-tab.on{background:var(--blue);color:#fff}
.gal-body{overflow-y:auto;height:calc(100vh - 96px);padding:16px 24px}
.gal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gal-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s}
.gal-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 16px #4374F715}
.gal-thumb{aspect-ratio:3/4;position:relative;overflow:hidden}
.gal-info{padding:8px 10px}
.gal-name{font-size:10.5px;font-weight:600;margin-bottom:3px}
.gal-tags{display:flex;gap:3px;margin-bottom:5px}
.gal-tag{font-size:8px;padding:1px 5px;border-radius:2px;background:#4374F712;color:var(--blue2)}
.gal-cta{width:100%;padding:6px;border-radius:5px;background:var(--blue);color:#fff;font-size:10.5px;font-weight:600;transition:.15s}
.gal-cta:hover{filter:brightness(1.08)}

/* ═══ STUDIO ═══ */
.studio-head{display:flex;align-items:center;gap:8px;padding:12px 24px;border-bottom:1px solid var(--border)}
.studio-back{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:13px;border:1px solid var(--border3);background:transparent;transition:.15s}
.studio-back:hover{background:#ffffff08;color:var(--text)}
.studio-mode-bar{display:flex;gap:3px;margin-left:auto}
.studio-mode{padding:4px 10px;border-radius:5px;font-size:10px;cursor:pointer;color:var(--text3);font-weight:500;transition:.15s;display:flex;align-items:center;gap:4px}
.studio-mode:hover{background:#ffffff08}
.studio-mode.on{background:var(--blue);color:#fff}
.studio-body{display:flex;height:calc(100vh - 97px)}
.studio-panel{width:380px;border-right:1px solid var(--border);overflow-y:auto;padding:16px 18px;flex-shrink:0}
.studio-canvas{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;align-items:center}

/* Studio form */
.sf-group{margin-bottom:14px}
.sf-label{font-size:10.5px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.sf-textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px;color:var(--text);font-size:11.5px;resize:vertical;min-height:80px;font-family:var(--font);transition:border-color .15s}
.sf-textarea:focus{border-color:var(--blue)}
.sf-upload{border:1.5px dashed var(--border3);border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:var(--bg2);transition:.15s;display:flex;flex-direction:column;align-items:center;gap:6px}
.sf-upload:hover{border-color:var(--text3);background:var(--bg3)}
.sf-upload.ok{border-style:solid;border-color:var(--accent);background:var(--accent-g)}
.sf-select-row{display:flex;gap:6px}
.sf-select{flex:1;padding:7px 10px;border-radius:6px;background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-size:11px;cursor:pointer;text-align:center;transition:.15s}
.sf-select:hover{border-color:var(--text3)}
.sf-select.on{border-color:var(--blue);background:#4374F712;color:var(--blue2)}
.sf-divider{height:1px;background:var(--border2);margin:14px 0}
.sf-hint{font-size:9.5px;color:var(--text3);line-height:1.4;padding:6px 8px;background:var(--bg2);border-radius:6px;margin-top:6px}

/* Studio skill */
.sf-skill{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.sf-skill-head{display:flex;align-items:center;justify-content:space-between}
.sf-skill-name{font-size:10.5px;font-weight:600;display:flex;align-items:center;gap:5px}
.sf-skill-toggle{width:28px;height:16px;border-radius:8px;position:relative;cursor:pointer;transition:.2s}
.sf-skill-toggle.on{background:var(--accent)}.sf-skill-toggle.off{background:var(--text3)}
.sf-skill-toggle::after{content:'';position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:.2s}
.sf-skill-toggle.on::after{left:14px}.sf-skill-toggle.off::after{left:2px}
.sf-skill-rules{margin-top:6px;display:flex;flex-direction:column;gap:2px}
.sf-skill-rule{font-size:9.5px;color:var(--text2);display:flex;gap:5px;line-height:1.4}

/* Canvas preview */
.cv-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text3);gap:10px}
.cv-empty-icon{width:56px;height:56px;border-radius:14px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:24px}
.cv-grid{display:grid;gap:10px;width:100%}
.cv-card{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden;position:relative}
.cv-card-img{width:100%;aspect-ratio:1/1;position:relative}
.cv-card-bar{padding:8px 10px;display:flex;align-items:center;justify-content:space-between}
.cv-card-actions{display:flex;gap:4px}

/* Progress overlay */
.cv-progress{position:absolute;inset:0;background:#08090dee;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-radius:10px}
.cv-progress-ring{position:relative;width:56px;height:56px}
.cv-progress-ring svg{transform:rotate(-90deg)}
.cv-progress-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--mono);color:var(--accent)}

/* Gen pipeline (reused from v3) */
.gp{padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg2)}
.gp-inner{display:flex;align-items:center;max-width:680px;margin:0 auto}
.gp-n{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:56px}
.gp-c{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;transition:.3s}
.gp-c.off{border:1.5px solid var(--border3);color:var(--text3)}.gp-c.on{border:1.5px solid var(--accent);color:var(--accent);background:var(--accent-g)}.gp-c.done{border:1.5px solid var(--accent);color:var(--bg);background:var(--accent)}
.gp-l{font-size:9px;color:var(--text3)}.gp-l.hi{color:var(--text)}
.gp-e{font-size:8px;color:var(--text3);font-family:var(--mono);height:10px}
.gp-bar{flex:1;height:1.5px;background:var(--border3);margin:0 4px 16px}.gp-bar.done{background:var(--accent)}

.gen-main{max-width:900px;margin:0 auto;padding:16px 24px 48px}
.g-vid{width:100%;aspect-ratio:9/16;border-radius:6px;overflow:hidden;position:relative;max-height:240px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(8px)}
.modal-bg.open{display:flex}
.modal{background:var(--bg4);border:1px solid var(--border3);border-radius:12px;padding:20px;width:480px;max-width:92vw;animation:fadeUp .2s}
.modal h3{font-size:14px;font-weight:700;margin-bottom:12px}
.modal textarea{width:100%;min-height:90px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px;color:var(--text);font-size:11.5px;resize:vertical;font-family:var(--font)}
.modal-f{display:flex;gap:6px;justify-content:flex-end;margin-top:12px}

@media(max-width:768px){
  .sb{display:none}.app{margin-left:0}
  .mode-grid,.tpl-grid{grid-template-columns:repeat(2,1fr)}
  .ba-grid{grid-template-columns:1fr}
  .gal-grid{grid-template-columns:repeat(2,1fr)}
  .showcase{display:none}
  .hero-h1{font-size:24px}
  .studio-body{flex-direction:column}.studio-panel{width:100%;border-right:none;border-bottom:1px solid var(--border)}
}
</style>
</head>
<body>

<nav class="sb">
  <div class="sb-logo" onclick="nav('home')">N</div>

function renderStudioCanvas(){
  const cv=document.getElementById('studioCanvas');
  if(studioResults.length===0 && !studioGenerating){
    cv.innerHTML=`<div class="cv-empty"><div class="cv-empty-icon">${studioMode==='t2i'?'🖼':studioMode==='i2i'?'🎨':'🎬'}</div>
      <div style="font-size:13px;font-weight:600;color:var(--text2)">配置左侧参数后点击生成</div>
      <div style="font-size:11px;color:var(--text3)">生成结果将展示在这里</div></div>`;
    return;
  }
  if(studioGenerating){
    const isVideo=studioMode==='t2v';
    const count=isVideo?1:4;
    cv.innerHTML=`<div style="width:100%;animation:fadeUp .3s"><div style="font-size:12px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px"><div class="spinner"></div>生成中 · 预计 ${isVideo?'~40s':'~15s'}</div>
      <div class="cv-grid" style="grid-template-columns:repeat(${isVideo?1:2},1fr)">${Array(count).fill(0).map((_,i)=>{
        const hue=(i*80+120)%360;
        return`<div class="cv-card"><div class="cv-card-img" style="background:linear-gradient(135deg,hsl(${hue},15%,16%),hsl(${(hue+40)%360},12%,11%));${isVideo?'aspect-ratio:9/16;max-height:360px':''}">
          <div class="cv-progress" id="cvp${i}"><div class="cv-progress-ring"><svg width="56" height="56"><circle cx="28" cy="28" r="24" fill="none" stroke="#ffffff08" stroke-width="3"/><circle cx="28" cy="28" r="24" fill="none" stroke="var(--accent)" stroke-width="3" stroke-dasharray="${2*Math.PI*24}" stroke-dashoffset="${2*Math.PI*24}" stroke-linecap="round" id="cvpc${i}"/></svg><div class="cv-progress-pct" id="cvpt${i}">0%</div></div>
            <div style="font-size:10px;color:var(--text3)" id="cvph${i}">${isVideo?'渲染视频...':'生成图片...'}</div></div>
        </div></div>`}).join('')}</div></div>`;
    // Animate progress
    let progs=Array(count).fill(0);
    const t=setInterval(()=>{
      let allDone=true;
      progs.forEach((p,i)=>{
        if(p<100){
          progs[i]=Math.min(100,p+2+Math.random()*(isVideo?3:6));
          allDone=false;
          const c=2*Math.PI*24;const o=c-(progs[i]/100)*c;
          const el=document.getElementById('cvpc'+i);if(el)el.setAttribute('stroke-dashoffset',o);
          const pt=document.getElementById('cvpt'+i);if(pt)pt.textContent=Math.round(progs[i])+'%';
          const ph=document.getElementById('cvph'+i);
          if(ph){
            if(isVideo) ph.textContent=progs[i]<30?'生成分镜...':progs[i]<60?'渲染视频...':progs[i]<85?'色彩校正...':'音频同步...';
            else ph.textContent=progs[i]<50?'生成中...':'优化细节...';
          }
        }
      });
      if(allDone){clearInterval(t);studioGenerating=false;studioResults=progs.map((_,i)=>({id:i,hue:(i*80+120)%360}));renderStudioDone();}
    },isVideo?250:150);
    return;
  }
}

  const cv=document.getElementById('studioCanvas');
  const isVideo=studioMode==='t2v';
  cv.innerHTML=`<div style="width:100%;animation:fadeUp .3s">

    <div class="cv-grid" style="grid-template-columns:repeat(${isVideo?1:2},1fr)">${studioResults.map((r,i)=>{

          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
            <div style="width:${isVideo?36:24}px;height:${isVideo?36:24}px;border-radius:50%;background:#ffffff18;border:1.5px solid #ffffff30;display:flex;align-items:center;justify-content:center;font-size:${isVideo?12:9}px;color:#fff">${isVideo?'▶':'AI'}</div></div>
          ${isVideo?'<div style="position:absolute;top:5px;left:5px;font-size:8px;font-weight:700;color:#ffffffaa">♪ TikTok</div>':''}
          <div style="position:absolute;top:5px;right:5px;font-size:8px;padding:1px 5px;border-radius:2px;background:#00e0aa35;color:#00e0aa">质量 ${(0.88+i*0.03).toFixed(2)}</div>
        </div>
        <div class="cv-card-bar"><span style="font-size:9.5px;color:var(--text3)">${isVideo?'15s · 1080×1920':'1024×1024 · PNG'}</span>

/* ═══ GEN PIPELINE (i2v / viral replication — abbreviated) ═══ */
const STEPS=[{id:0,label:"上传",icon:"↑",est:"—"},{id:1,label:"拆解",icon:"◈",est:"~15s"},{id:2,label:"关键帧",icon:"◧",est:"~20s"},{id:3,label:"分镜",icon:"▶",est:"~40s"},{id:4,label:"合成",icon:"✦",est:"~10s"}];
let GS={step:0,refUp:false,prodUp:false,aP:0,aDone:false,fP:{},fD:{},sP:{},sD:{},mP:0,timers:[]};
function gClr(){GS.timers.forEach(t=>clearInterval(t));GS.timers=[];}
function resetGen(){gClr();GS={step:0,refUp:false,prodUp:false,aP:0,aDone:false,fP:{},fD:{},sP:{},sD:{},mP:0,timers:[]};skillDB=skillDB.filter(s=>!s.learned);document.getElementById('genPipe').innerHTML='';}
function renderPipe(){const el=document.getElementById('genPipe');if(!el.children.length){el.innerHTML=STEPS.map((s,i)=>{const l=i<4?`<div class="gp-bar" id="gpb${i}"></div>`:'';return`<div class="gp-n"><div class="gp-c off" id="gpc${i}">${s.icon}</div><span class="gp-l" id="gpl${i}">${s.label}</span><span class="gp-e" id="gpe${i}"></span></div>${l}`}).join('')}STEPS.forEach((s,i)=>{const d=GS.step>i,a=GS.step===i;const c=document.getElementById('gpc'+i);c.className='gp-c '+(d?'done':a?'on':'off');c.textContent=d?'✓':s.icon;document.getElementById('gpl'+i).className='gp-l '+(a||d?'hi':'');document.getElementById('gpe'+i).textContent=a?s.est:'';if(i<4)document.getElementById('gpb'+i).className='gp-bar '+(d?'done':'')})}

function ring(p){const sz=60,sw=2.5,r=(sz-sw*2)/2,c=2*Math.PI*r,o=c-(p/100)*c;return`<div class="cv-progress-ring" style="width:${sz}px;height:${sz}px"><svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#ffffff08" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--accent)" stroke-width="${sw}" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round"/></svg><div class="cv-progress-pct">${Math.round(p)}%</div></div>`}
function fakeFrame(seed,w,h,l){const hu=(seed*53+120)%360;return`<div style="width:${w}px;height:${h}px;border-radius:4px;overflow:hidden;position:relative;background:linear-gradient(140deg,hsl(${hu},20%,13%),hsl(${(hu+50)%360},16%,9%))"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:16px;height:16px;border-radius:50%;border:1px solid #ffffff14;display:flex;align-items:center;justify-content:center;font-size:6px;color:#ffffff22">${l}</div></div></div>`}

function renderUpload(){document.getElementById('genApp').innerHTML=`<div style="animation:fadeUp .3s;text-align:center;padding-top:8px"><h2 style="font-size:15px;font-weight:700;margin-bottom:4px">上传素材</h2><p style="font-size:11px;color:var(--text2);margin-bottom:16px">爆款参考 + 产品素材</p><div class="g-up-grid" style="max-width:500px;margin:0 auto 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px"><div class="sf-upload" id="gz1" onclick="GS.refUp=true;updU()" style="min-height:120px"></div><div class="sf-upload" id="gz2" onclick="GS.prodUp=true;updU()" style="min-height:120px"></div></div><button class="btn btn-acc" id="gSB" disabled onclick="go1()">开始智能拆解 →</button><p id="gUH" style="font-size:9.5px;color:var(--text3);margin-top:8px"></p></div>`;updU()}
function updU(){const z1=document.getElementById('gz1'),z2=document.getElementById('gz2');if(GS.refUp){z1.className='sf-upload ok';z1.innerHTML='<span style="color:var(--accent);font-size:16px">✓</span><div style="font-size:11px;font-weight:600;color:var(--accent)">参考已上传</div><div style="font-size:9px;color:var(--text3)">viral.mp4 · 18s</div>'}else{z1.className='sf-upload';z1.innerHTML='<span style="font-size:16px;color:var(--text3)">↑</span><div style="font-size:11px">爆款参考</div><div style="font-size:9px;color:var(--text3)">MP4/MOV</div>'}if(GS.prodUp){z2.className='sf-upload ok';z2.style.borderColor='var(--warn)';z2.style.background='#ffb44e08';z2.innerHTML='<span style="color:var(--warn);font-size:16px">✓</span><div style="font-size:11px;font-weight:600;color:var(--warn)">产品已上传</div><div style="font-size:9px;color:var(--text3)">serum.png</div>'}else{z2.className='sf-upload';z2.style.cssText='min-height:120px';z2.innerHTML='<span style="font-size:16px;color:var(--text3)">⊕</span><div style="font-size:11px">产品素材</div><div style="font-size:9px;color:var(--text3)">PNG/JPG</div>'}document.getElementById('gSB').disabled=!(GS.refUp&&GS.prodUp);document.getElementById('gUH').textContent=(!GS.refUp||!GS.prodUp)?'点击区域模拟上传':''}

function go1(){GS.step=1;GS.aP=0;GS.aDone=false;gClr();renderPipe();document.getElementById('genApp').innerHTML=`<div style="text-align:center;padding:28px 0"><div id="gr1">${ring(0)}</div><div style="font-size:15px;font-weight:700;margin:10px 0 4px">智能拆解中</div><div style="font-size:11px;color:var(--accent)" id="gp1">解码...</div><div style="font-size:9.5px;color:var(--text3);font-family:var(--mono)" id="ge1"></div></div>`;const t=setInterval(()=>{GS.aP=Math.min(100,GS.aP+2+Math.random()*3);const p=Math.round(GS.aP);const rw=document.getElementById('gr1');if(rw){const sz=60,sw=2.5,r=(sz-sw*2)/2,c=2*Math.PI*r,o=c-(p/100)*c;const ci=rw.querySelectorAll('circle');if(ci[1])ci[1].setAttribute('stroke-dashoffset',o);const pc=rw.querySelector('.cv-progress-pct');if(pc)pc.textContent=p+'%'}const ph=["解码...","场景分析...","运镜识别...","特征提取...","方法论学习..."];document.getElementById('gp1').textContent=ph[Math.min(Math.floor(p/20),4)];document.getElementById('ge1').textContent=`剩余 ${Math.max(1,Math.round((100-p)/7))}s`;if(GS.aP>=100){clearInterval(t);GS.aDone=true;const now=new Date();skillDB.unshift({id:'sl'+Date.now(),name:`爆款·${now.getMonth()+1}.${now.getDate()}`,icon:"🔥",active:true,learned:true,rules:["前3秒钩子","快节奏≤4s","暖调柔光","场景化","社交证明+CTA","分屏对比","Hook→展→场→证→CTA"]});renderDone1()}},150);GS.timers.push(t)}

function renderDone1(){const ls=skillDB.find(s=>s.learned);document.getElementById('genApp').innerHTML=`<div style="animation:fadeUp .3s"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div><h2 style="font-size:15px;font-weight:700">拆解完成</h2><p style="font-size:11px;color:var(--text2)">${scenes.length}分镜·20s</p></div><span class="badge" style="background:var(--accent-g);color:var(--accent);border:1px solid #00e0aa30">下一步~20s</span></div>${ls?`<div style="background:#8b6cf708;border:1px solid #8b6cf720;border-radius:10px;padding:10px 12px;margin-bottom:12px;display:flex;gap:8px"><span style="font-size:14px">🧠</span><div style="flex:1"><div style="font-size:11px;font-weight:600;color:var(--purple)">已学习→「${ls.name}」</div><div style="font-size:9.5px;color:var(--text2)">${ls.rules.length}条方法论可复用</div></div></div>`:''}<div style="background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;margin-bottom:10px"><div style="font-size:10px;font-weight:600;color:var(--accent);margin-bottom:6px">◈ 理解</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${[{k:"来源",v:"TikTok·泰国"},{k:"风格",v:"暖调·快节奏"},{k:"适配",v:"94%"}].map(i=>`<div style="background:var(--bg2);border-radius:6px;padding:5px 8px"><div style="font-size:8.5px;color:var(--text3)">${i.k}</div><div style="font-size:10.5px;font-weight:600">${i.v}</div></div>`).join('')}</div></div>${scenes.map((s,i)=>{const c=PAL[i%5];return`<div style="background:var(--bg3);border:1px solid var(--border2);border-radius:7px;margin-bottom:5px"><div style="display:flex;gap:8px;padding:8px 10px"><div style="width:24px;height:24px;border-radius:5px;background:${c.bg};color:${c.tx};border:1px solid ${c.br}25;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">${s.id}</div><div style="flex:1;min-width:0"><div style="display:flex;gap:3px;margin-bottom:2px"><span style="font-size:8.5px;padding:1px 5px;border-radius:2px;background:${c.bg};color:${c.tx}">${s.time}·${s.dur}s</span><span style="font-size:8.5px;padding:1px 5px;border-radius:2px;background:#ffffff06;color:var(--text2)">${s.camera}</span></div><div style="font-size:10.5px;color:var(--text2);line-height:1.4">${s.desc}</div>${s.hook?`<div style="font-size:9px;color:var(--warn);margin-top:2px">🔥 ${s.hook}</div>`:''}</div><button class="btn btn-g btn-xs" onclick="openEditM('修改${s.id}','${s.desc.replace(/'/g,"\\'")}',v=>{scenes[${i}].desc=v;renderDone1()})">✎</button></div></div>`}).join('')}<div class="btns"><button class="btn btn-g" onclick="GS.step=0;renderPipe();renderUpload()">←</button><button class="btn btn-acc" onclick="go2()">确认·关键帧→</button></div></div>`}

function go2(){GS.step=2;gClr();renderPipe();scenes.forEach(s=>{GS.fP[s.id]=0;GS.fD[s.id]=false});document.getElementById('genApp').innerHTML=`<div style="animation:fadeUp .3s"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div><h2 style="font-size:15px;font-weight:700" id="fH">关键帧生成</h2><p style="font-size:11px;color:var(--text2)" id="fS">并行... 0/5</p></div><span class="badge" id="fB" style="background:#8b6cf710;color:#8b6cf7;border:1px solid #8b6cf730">NANO BANNA</span></div><div id="fCh"></div>${scenes.map((s,i)=>{const c=PAL[i%5];const last=i===4;return`<div style="background:var(--bg3);border:1px solid var(--border2);border-radius:7px;margin-bottom:5px;overflow:hidden" id="fc${s.id}"><div style="display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid var(--border)"><div style="width:20px;height:20px;border-radius:4px;background:${c.bg};color:${c.tx};border:1px solid ${c.br}25;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800">${s.id}</div><div style="font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.desc.substring(0,35)}...</div><span id="fSt${s.id}" style="display:flex;align-items:center;gap:4px"><div class="spinner" style="border-top-color:${c.fl};width:12px;height:12px"></div><span style="font-size:9px;color:var(--text3);font-family:var(--mono)">0%</span></span></div><div id="fPb${s.id}" style="padding:0 10px 5px"><div style="height:2px;border-radius:1px;background:#ffffff08;overflow:hidden"><div id="fPf${s.id}" style="height:100%;width:0%;border-radius:1px;background:linear-gradient(90deg,${c.br},${c.tx});transition:width .25s"></div></div></div><div style="display:flex;align-items:center;padding:6px 10px;gap:6px"><div style="text-align:center;flex-shrink:0"><div style="font-size:7.5px;color:var(--text3)">首帧${i>0?'(=S'+(s.id-1)+'尾)':''}</div><div id="fF${s.id}" style="width:100px;height:60px;border-radius:3px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center"><div class="spinner" style="border-top-color:${c.fl};width:10px;height:10px"></div></div></div><div style="color:var(--text3);font-size:9px;opacity:.3">→</div><div style="text-align:center;flex-shrink:0"><div style="font-size:7.5px;color:var(--text3)">尾帧${!last?'(→S'+(s.id+1)+'首)':''}</div><div id="fE${s.id}" style="width:100px;height:60px;border-radius:3px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center"><div class="spinner" style="border-top-color:${c.fl};width:10px;height:10px"></div></div></div>${!last?'<div style="display:flex;align-items:center;gap:1px;margin:0 4px"><div style="width:8px;border-top:1px dashed var(--accent)"></div><span style="font-size:6px;color:var(--accent);font-weight:700">=</span><div style="width:8px;border-top:1px dashed var(--accent)"></div></div>':''}<div id="fA${s.id}" style="margin-left:auto;flex-shrink:0"></div></div></div>`}).join('')}<div id="fBt" class="btns" style="display:none"><button class="btn btn-g" onclick="GS.step=1;GS.aDone=true;renderPipe();renderDone1()">←</button><button class="btn btn-acc" onclick="go3()">确认·分镜→</button></div></div>`;const t=setInterval(()=>{let done=true;scenes.forEach(s=>{if(!GS.fD[s.id]){const c=PAL[(s.id-1)%5];GS.fP[s.id]=Math.min(100,GS.fP[s.id]+2.5+Math.random()*4);const p=Math.round(GS.fP[s.id]);if(GS.fP[s.id]>=100){GS.fP[s.id]=100;GS.fD[s.id]=true;document.getElementById('fSt'+s.id).innerHTML=`<span style="font-size:8px;padding:1px 5px;border-radius:2px;background:${c.bg};color:${c.tx};font-family:var(--mono)">✓</span>`;document.getElementById('fPb'+s.id).style.display='none';const ff=document.getElementById('fF'+s.id);if(ff)ff.outerHTML=fakeFrame(s.id*10,100,60,'F'+s.id);const fe=document.getElementById('fE'+s.id);if(fe)fe.outerHTML=fakeFrame(s.id*10+5,100,60,'E'+s.id);document.getElementById('fA'+s.id).innerHTML=`<button class="btn btn-g btn-xs" onclick="go2()">↻</button>`}else{done=false;document.getElementById('fSt'+s.id).querySelector('span:last-child').textContent=p+'%';document.getElementById('fPf'+s.id).style.width=p+'%'}}});const dc=scenes.filter(s=>GS.fD[s.id]).length;document.getElementById('fS').textContent=dc===5?'5组·链式一致':`并行... ${dc}/5`;if(dc===5){document.getElementById('fB').style.cssText='background:var(--accent-g);color:var(--accent);border:1px solid #00e0aa30;font-size:9px;padding:3px 9px;border-radius:4px;font-weight:500';document.getElementById('fB').textContent='下一步~40s'}if(done){clearInterval(t);document.getElementById('fBt').style.display='flex'}},220);GS.timers.push(t)}

function go3(){GS.step=3;gClr();renderPipe();scenes.forEach(s=>{GS.sP[s.id]=0;GS.sD[s.id]=false});document.getElementById('genApp').innerHTML=`<div style="animation:fadeUp .3s"><div style="display:flex;justify-content:space-between;margin-bottom:14px"><div><h2 style="font-size:15px;font-weight:700">分镜视频</h2><p style="font-size:11px;color:var(--text2)" id="s3s">Veo并行... 0/5</p></div><span class="badge" id="s3b" style="background:#4374F710;color:var(--blue2);border:1px solid #4374F730">Veo·并行</span></div><div style="display:flex;gap:2px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;margin-bottom:10px;align-items:center">${scenes.map((s,i)=>`<div style="flex:1;height:3px;border-radius:2px;background:#ffffff08;overflow:hidden"><div id="tl${s.id}" style="height:100%;border-radius:2px;width:0%;background:${PAL[i%5].fl};transition:width .3s"></div></div>`).join('')}<span style="font-size:8.5px;color:var(--text3);margin-left:5px;font-family:var(--mono)">20s</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${scenes.map((s,i)=>{const c=PAL[i%5];const hue=(s.id*71+60)%360;return`<div style="background:var(--bg3);border:1px solid var(--border2);border-radius:7px;overflow:hidden" id="sC${s.id}"><div style="padding:8px"><div style="display:flex;align-items:center;gap:4px;margin-bottom:5px"><div style="width:16px;height:16px;border-radius:3px;background:${c.bg};color:${c.tx};border:1px solid ${c.br}25;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800">${s.id}</div><span style="font-size:9.5px;flex:1">${s.time}</span><span id="sSt${s.id}" style="font-size:8.5px;color:var(--text3);font-family:var(--mono)">0%</span></div><div class="g-vid" style="background:linear-gradient(160deg,hsl(${hue},18%,12%),hsl(${(hue+60)%360},14%,7%))"><div style="position:absolute;top:3px;left:3px;font-size:7px;color:#ffffff77">♪ TikTok</div><div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:#ffffff15"><div id="sVp${s.id}" style="height:100%;background:var(--accent);width:0%;transition:width .3s"></div></div></div><div style="font-size:9.5px;color:var(--text2);margin:5px 0;line-height:1.3">${s.desc.substring(0,45)}...</div><div id="sPb${s.id}" style="height:2px;border-radius:1px;background:#ffffff08;overflow:hidden;margin-bottom:5px"><div id="sPf${s.id}" style="height:100%;border-radius:1px;width:0%;background:linear-gradient(90deg,${c.br},${c.tx});transition:width .3s"></div></div><div id="sBt${s.id}" style="display:flex;gap:3px"></div></div></div>`}).join('')}</div><div id="s3bt" class="btns" style="display:none"><button class="btn btn-g" onclick="go2()">←</button><button class="btn btn-acc" onclick="go4()">确认·合成→</button></div></div>`;const t=setInterval(()=>{let done=true;scenes.forEach(s=>{if(!GS.sD[s.id]){GS.sP[s.id]=Math.min(100,GS.sP[s.id]+1.2+Math.random()*2);const p=Math.round(GS.sP[s.id]);if(GS.sP[s.id]>=100){GS.sP[s.id]=100;GS.sD[s.id]=true;document.getElementById('sSt'+s.id).innerHTML='<span style="color:var(--accent)">✓</span>';document.getElementById('sPb'+s.id).style.display='none';document.getElementById('sBt'+s.id).innerHTML=`<button class="btn btn-g btn-xs" style="flex:1" onclick="go3()">↻</button>`}else{done=false;document.getElementById('sSt'+s.id).textContent=p+'%';document.getElementById('sPf'+s.id).style.width=p+'%';const vp=document.getElementById('sVp'+s.id);if(vp)vp.style.width=p+'%'}}document.getElementById('tl'+s.id).style.width=(GS.sP[s.id]||0)+'%'});const dc=scenes.filter(s=>GS.sD[s.id]).length;document.getElementById('s3s').textContent=dc===5?'就绪':`Veo... ${dc}/5`;if(dc===5){document.getElementById('s3b').style.cssText='background:var(--accent-g);color:var(--accent);border:1px solid #00e0aa30;font-size:9px;padding:3px 9px;border-radius:4px;font-weight:500';document.getElementById('s3b').textContent='~10s'}if(done){clearInterval(t);document.getElementById('s3bt').style.display='flex'}},280);GS.timers.push(t)}

function go4(){GS.step=4;GS.mP=0;gClr();renderPipe();document.getElementById('genApp').innerHTML=`<div style="text-align:center;padding:28px 0"><div id="mr4">${ring(0)}</div><div style="font-size:15px;font-weight:700;margin:10px 0 4px">合成中</div><div style="font-size:11px;color:var(--accent)" id="mp4">拼接...</div></div>`;const t=setInterval(()=>{GS.mP=Math.min(100,GS.mP+2.5+Math.random()*4);const p=Math.round(GS.mP);const rw=document.getElementById('mr4');if(rw){const sz=60,sw=2.5,r=(sz-sw*2)/2,c=2*Math.PI*r,o=c-(p/100)*c;const ci=rw.querySelectorAll('circle');if(ci[1])ci[1].setAttribute('stroke-dashoffset',o);const pc=rw.querySelector('.cv-progress-pct');if(pc)pc.textContent=p+'%'}document.getElementById('mp4').textContent=p<30?"拼接...":p<60?"转场处理...":p<85?"色彩校正...":"音频同步...";if(GS.mP>=100){clearInterval(t);renderFinal()}},180);GS.timers.push(t)}

function renderFinal(){const ls=skillDB.find(s=>s.learned);document.getElementById('genApp').innerHTML=`<div style="animation:fadeUp .3s;text-align:center"><div style="width:44px;height:44px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--accent-g);border:1.5px solid #00e0aa30;color:var(--accent)">✦</div><div style="font-size:16px;font-weight:700;margin-bottom:3px">全片完成</div><div style="font-size:11px;color:var(--text2);margin-bottom:16px">20s · 1080×1920 · 耗时 2m08s</div><div style="max-width:240px;margin:0 auto 16px;border-radius:10px;overflow:hidden;border:1px solid #00e0aa25;background:var(--bg3)"><div style="aspect-ratio:9/16;max-height:340px;position:relative;background:linear-gradient(160deg,hsl(180,18%,12%),hsl(240,14%,7%))"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:36px;height:36px;border-radius:50%;background:#ffffff18;border:1.5px solid #ffffff35;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff">▶</div></div><div style="position:absolute;top:5px;left:5px;font-size:8px;font-weight:700;color:#ffffffaa">♪ TikTok</div></div><div style="display:flex">${scenes.map((s,i)=>`<div style="flex:${s.dur};height:2px;background:${PAL[i%5].fl}"></div>`).join('')}</div></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:400px;margin:0 auto 16px">${[{k:"耗时",v:"2:08",c:"var(--accent)"},{k:"帧链",v:"0.94",c:"var(--purple)"},{k:"风格",v:"0.91",c:"var(--warn)"},{k:"流畅",v:"0.92",c:"var(--blue2)"}].map(s=>`<div style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px;text-align:center"><div style="font-size:8.5px;color:var(--text3)">${s.k}</div><div style="font-size:14px;font-weight:700;color:${s.c};font-family:var(--mono)">${s.v}</div></div>`).join('')}</div>${ls?`<div style="background:#8b6cf708;border:1px solid #8b6cf720;border-radius:8px;padding:8px 12px;display:flex;gap:6px;max-width:400px;margin:0 auto 16px;text-align:left"><span>💡</span><div style="flex:1"><div style="font-size:10.5px;font-weight:600;color:var(--purple)">「${ls.name}」已保存</div><div style="font-size:9px;color:var(--text2)">${ls.rules.length}条方法论可复用</div></div></div>`:''}<div class="btns"><button class="btn btn-g" onclick="go3()">←调整</button><button class="btn btn-acc" style="padding:8px 28px">下载成片↓</button><button class="btn btn-g" style="border-color:#00e0aa25;color:var(--accent);background:var(--accent-g)" onclick="nav('home')">继续创作↻</button></div></div>`}

/* INIT */
renderHome();
</script>
</body>
